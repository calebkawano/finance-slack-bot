name: Finance Slack Bot

on:
  schedule:
    - cron: '0 16 * * 1'  # Monday 9am PST (UTC-8)
    - cron: '0 16 * * 5'  # Friday 9am PST (UTC-8)
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run finance slack bot (test)
        run: python3 bot.py --test
